services:

  db:
    image: mariadb:12.0.2-ubi10
    container_name: designhg-mysql
    command: '--default-authentication-plugin=mysql_native_password'
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=designhg
      - MYSQL_USER=designhg
      - MYSQL_PASSWORD=designhg
    ports:
      - 3383:3306
    volumes:
      - ./docker/mysql/data/:/var/lib/mysql/

  ftp:
    image: delfer/alpine-ftp-server
    container_name: designhg-ftp
    volumes:
      - ./src/wordpress:/var/www/html
    environment:
      - USERS=ftp1|ftp1234|/var/www/html
      - ADDRESS=ftp
    ports:
      - "21:21"
      - "21000-21010:21000-21010"

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: designhg-php
    volumes:
      - ./src/:/var/www/
      - ./logs/:/var/log/wordpress
      - ./docker/php-my.ini:/usr/local/etc/php/conf.d/php-my.ini
    working_dir: /var/www/wordpress
    entrypoint: >
      sh -c "
        ln -sfn /var/www/designhg-theme /var/www/wordpress/wp-content/themes/designhg-theme &&
        chown www-data:www-data -R /var/www/wordpress &&
        chmod a+rwx -R /var/www/wordpress -R &&
        php-fpm
      "
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "designhg.loc:host-gateway"
    depends_on:
      - db
      - ftp

  nginx:
    image: nginx:alpine
    container_name: designhg-nginx
    volumes:
      - ./src/:/var/www/
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - php
